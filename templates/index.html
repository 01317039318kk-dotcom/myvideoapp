<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Video Downloader</title>
    <style>
        body { background: #121212; color: white; text-align: center; font-family: Arial; }
        input { padding: 10px; width: 70%; border-radius: 5px; }
        video { width: 90%; margin-top: 20px; border-radius: 10px; }
        .btn { padding: 10px 20px; margin: 10px; border: none; cursor: pointer; border-radius: 5px; }
        .dl-mp4 { background: #007bff; color: white; }
        .dl-mp3 { background: #ffc107; color: black; }
    </style>
</head>
<body>
    <h2>Video Downloader</h2>
    <input type="text" id="videoUrl" placeholder="Paste YouTube Link Here">
    <button class="btn dl-mp4" onclick="getInfo()">Get Video</button>

    <div id="playerArea" style="display:none;">
        <video id="videoPlayer" controls></video>
        <p id="videoTitle"></p>
        <a id="mp4Btn" class="btn dl-mp4">Download MP4</a>
    </div>

    <script>
        async function getInfo() {
            const url = document.getElementById('videoUrl').value;
            const res = await fetch('/get_info', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: `url=${encodeURIComponent(url)}`
            });
            const data = await res.json();
            if(data.video_url) {
                document.getElementById('playerArea').style.display = 'block';
                document.getElementById('videoPlayer').src = data.video_url;
                document.getElementById('videoTitle').innerText = data.title;
                document.getElementById('mp4Btn').href = `/download?url=${encodeURIComponent(data.url)}`;
            } else {
                alert("Error: " + data.error);
            }
        }
    </script>
</body>
</html>
