<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SL Video Downloader</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #ff0050; --dark: #121212; --card: #1e1e1e; }
        body { background: var(--dark); color: white; padding-bottom: 80px; }
        .header { position: sticky; top: 0; z-index: 1000; background: rgba(18, 18, 18, 0.9); backdrop-filter: blur(10px); padding: 15px; border-bottom: 1px solid #333; }
        .search-bar { background: #222; border: 1px solid #444; color: white; border-radius: 50px; }
        .v-card { background: var(--card); border-radius: 12px; overflow: hidden; margin-bottom: 15px; cursor: pointer; }
        .v-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .v-title { padding: 10px; font-size: 14px; height: 50px; overflow: hidden; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #1a1a1a; display: flex; padding: 10px 0; border-top: 1px solid #333; }
        .nav-btn { background: none; border: none; color: #888; flex: 1; text-align: center; font-size: 12px; }
        .nav-btn.active { color: var(--primary); }
        .section { display: none; padding: 15px; }
        .section.active { display: block; }
        video { width: 100%; border-radius: 10px; }
    </style>
</head>
<body>

<div class="header">
    <div class="input-group">
        <input type="text" id="searchInput" class="form-control search-bar" placeholder="Search or Paste Link...">
        <button class="btn btn-danger rounded-circle ms-2" onclick="handleSearch()"><i class="fas fa-search"></i></button>
    </div>
</div>

<div id="home-sec" class="section active">
    <div id="video-feed" class="row row-cols-1 row-cols-md-3"></div>
    <div id="loader" class="text-center p-3" style="display:none;"><div class="spinner-border text-danger"></div></div>
</div>

<div id="playing-sec" class="section text-center">
    <video id="mainVideo" controls autoplay></video>
    <h6 id="playTitle" class="mt-3"></h6>
    <div class="mt-3">
        <button onclick="startDownload('720p')" class="btn btn-primary m-1">720p MP4</button>
        <button onclick="startDownload('mp3')" class="btn btn-warning m-1">MP3 Audio</button>
    </div>
</div>

<div class="bottom-nav">
    <button class="nav-btn active" onclick="showSection('home')"><i class="fas fa-home d-block"></i>Home</button>
    <button class="nav-btn" onclick="showSection('playing')"><i class="fas fa-play d-block"></i>Playing</button>
</div>

<script>
    let playingUrl = "";

    async function loadVideos(q) {
        document.getElementById('loader').style.display = "block";
        const res = await fetch(`/search?q=${q}`);
        const data = await res.json();
        const feed = document.getElementById('video-feed');
        feed.innerHTML = "";
        data.videos.forEach(v => {
            feed.innerHTML += `
                <div class="col">
                    <div class="v-card" onclick="playThis('${v.url}')">
                        <img src="${v.thumbnail}">
                        <div class="v-title">${v.title}</div>
                    </div>
                </div>`;
        });
        document.getElementById('loader').style.display = "none";
    }

    async function playThis(url) {
        playingUrl = url;
        showSection('playing');
        document.getElementById('playTitle').innerText = "Loading...";
        const fd = new FormData();
        fd.append('url', url);
        const res = await fetch('/get_info', {method: 'POST', body: fd});
        const data = await res.json();
        document.getElementById('mainVideo').src = data.video_url;
        document.getElementById('playTitle').innerText = data.title;
    }

    function showSection(name) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(name + '-sec').classList.add('active');
    }

    function handleSearch() {
        const val = document.getElementById('searchInput').value;
        if(val.includes('http')) playThis(val);
        else loadVideos(val);
    }

    function startDownload(q) {
        alert("Download started. Please wait...");
        window.location.href = `/download?url=${encodeURIComponent(playingUrl)}&quality=${q}`;
    }

    window.onload = () => loadVideos("Bangla new songs");
</script>
</body>
</html>
